<!DOCTYPE html>
<html>
<head>
    <title>Sign Language Recognition</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
 
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
 
        :root {
            --cream: #fdf6ee;
            --warm-white: #fff9f3;
            --sand: #e8d5b7;
            --terracotta: #c4704a;
            --terracotta-light: #d9896a;
            --terracotta-deep: #a85a38;
            --sage: #7a9e7e;
            --sage-light: #a8c5ab;
            --amber: #e6a84a;
            --brown-dark: #3d2b1f;
            --brown-light: #9c7a63;
            --text-main: #3d2b1f;
            --text-soft: #7a5f50;
            --shadow-warm: rgba(196, 112, 74, 0.15);
        }
 
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--cream);
            background-image:
                radial-gradient(ellipse at 20% 10%, rgba(230, 168, 74, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(196, 112, 74, 0.10) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(122, 158, 126, 0.06) 0%, transparent 70%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
 
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }
 
        header {
            text-align: center;
            margin-bottom: 32px;
            animation: fadeSlideDown 0.8s ease both;
        }
 
        .icon-wrap {
            font-size: 42px;
            margin-bottom: 8px;
            display: inline-block;
            animation: gentleFloat 4s ease-in-out infinite;
        }
 
        h2 {
            font-family: 'Lora', serif;
            font-size: 28px;
            font-weight: 600;
            color: var(--brown-dark);
            letter-spacing: -0.3px;
        }
 
        h2 span { color: var(--terracotta); }
 
        .subtitle {
            font-size: 13px;
            color: var(--text-soft);
            margin-top: 4px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }
 
        .container {
            background: var(--warm-white);
            border: 1px solid rgba(196, 112, 74, 0.18);
            border-radius: 24px;
            padding: 28px;
            width: 380px;
            max-width: 100%;
            box-shadow:
                0 4px 24px var(--shadow-warm),
                0 1px 4px rgba(61, 43, 31, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
            animation: fadeSlideUp 0.8s ease 0.2s both;
            position: relative;
            overflow: hidden;
        }
 
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--terracotta), var(--amber), var(--sage));
            border-radius: 24px 24px 0 0;
        }
 
        .video-wrap {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            background: linear-gradient(135deg, var(--sand) 0%, #d4b896 100%);
            aspect-ratio: 4/3;
        }
 
        .video-wrap::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            box-shadow: inset 0 0 0 1px rgba(196, 112, 74, 0.2);
            pointer-events: none;
        }
 
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: 16px;
        }
 
        .camera-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--brown-light);
            font-size: 13px;
            gap: 8px;
        }
 
        .camera-placeholder .cam-icon { font-size: 36px; opacity: 0.5; }
 
        .controls-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 18px;
        }
 
        .lang-wrap {
            flex: 1;
            position: relative;
        }
 
        .lang-wrap::after {
            content: '▾';
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--brown-light);
            font-size: 12px;
            pointer-events: none;
        }
 
        select {
            width: 100%;
            appearance: none;
            padding: 10px 32px 10px 14px;
            border-radius: 12px;
            border: 1px solid var(--sand);
            background: var(--cream);
            color: var(--text-main);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
 
        select:focus {
            border-color: var(--terracotta-light);
            box-shadow: 0 0 0 3px rgba(196, 112, 74, 0.12);
        }
 
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 20px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
            white-space: nowrap;
        }
 
        .btn:active { transform: scale(0.96); }
 
        .btn-detect {
            background: linear-gradient(135deg, var(--terracotta), var(--terracotta-deep));
            color: white;
            box-shadow: 0 3px 12px rgba(196, 112, 74, 0.35);
            flex: 1.2;
        }
 
        .btn-detect:hover {
            background: linear-gradient(135deg, var(--terracotta-light), var(--terracotta));
            box-shadow: 0 5px 18px rgba(196, 112, 74, 0.45);
            transform: translateY(-1px);
        }
 
        .btn-audio {
            background: linear-gradient(135deg, var(--sage), #5d8761);
            color: white;
            box-shadow: 0 3px 12px rgba(122, 158, 126, 0.35);
            min-width: 48px;
        }
 
        .btn-audio:hover {
            background: linear-gradient(135deg, var(--sage-light), var(--sage));
            box-shadow: 0 5px 18px rgba(122, 158, 126, 0.45);
            transform: translateY(-1px);
        }
 
        .btn-audio.speaking {
            animation: speakPulse 0.7s ease-in-out infinite;
        }
 
        .output-wrap {
            margin-top: 20px;
            background: var(--cream);
            border: 1px solid var(--sand);
            border-radius: 14px;
            padding: 16px 20px;
            min-height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
 
        .output-wrap.has-result {
            border-color: rgba(196, 112, 74, 0.35);
            background: rgba(253, 246, 238, 0.8);
        }
 
        .output-inner { text-align: center; }
 
        .output-label {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--brown-light);
            margin-bottom: 5px;
        }
 
        #output {
            font-family: 'Lora', serif;
            font-size: 22px;
            color: var(--brown-dark);
            font-style: italic;
        }
 
        #output.none-state {
            font-size: 15px;
            color: var(--text-soft);
            font-style: normal;
            font-family: 'DM Sans', sans-serif;
        }
 
        #output-en {
            font-size: 12px;
            color: var(--text-soft);
            margin-top: 3px;
            font-family: 'DM Sans', sans-serif;
            min-height: 16px;
        }
 
        .detecting .video-wrap::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(196, 112, 74, 0.08);
            animation: pulse 1s ease-in-out infinite;
            z-index: 1;
            border-radius: 16px;
        }
 
        .footer-note {
            margin-top: 20px;
            font-size: 12px;
            color: var(--brown-light);
            text-align: center;
            animation: fadeSlideUp 0.8s ease 0.5s both;
        }
 
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--sand), transparent);
            margin: 18px 0;
        }
 
        /* Toast */
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(12px);
            background: var(--brown-dark);
            color: var(--cream);
            padding: 9px 18px;
            border-radius: 100px;
            font-size: 13px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease;
            z-index: 999;
            white-space: nowrap;
        }
 
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
 
        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
 
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
 
        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-6px); }
        }
 
        @keyframes pulse {
            0%, 100% { opacity: 0; }
            50%       { opacity: 1; }
        }
 
        @keyframes resultPop {
            0%   { transform: scale(0.95); opacity: 0; }
            60%  { transform: scale(1.02); }
            100% { transform: scale(1); opacity: 1; }
        }
 
        @keyframes speakPulse {
            0%, 100% { box-shadow: 0 3px 12px rgba(122,158,126,0.35); }
            50%       { box-shadow: 0 3px 22px rgba(122,158,126,0.75); }
        }
 
        .result-pop { animation: resultPop 0.4s ease both; }
    </style>
</head>
 
<body>
 
<header>
    
    <h2>Sign <span>Language</span></h2>
    <p class="subtitle">Gesture recognition & translation</p>
</header>
 
<div class="container" id="card">
 
    <div class="video-wrap" id="videoWrap">
        <video id="video" autoplay playsinline></video>
        <div class="camera-placeholder" id="camPlaceholder">
            <span class="cam-icon">📷</span>
            <span>Starting camera…</span>
        </div>
    </div>
 
    <canvas id="canvas" style="display:none;"></canvas>
 
    <div class="divider"></div>
 
    <div class="controls-row">
        <div class="lang-wrap">
            <select id="language">
                <option value="en">🇺🇸 English</option>
                <option value="hi">🇮🇳 Hindi</option>
                <option value="es">🇪🇸 Spanish</option>
                <option value="fr">🇫🇷 French</option>
                <option value="de">🇩🇪 German</option>
            </select>
        </div>
        <button class="btn btn-detect" onclick="getGesture()">✦ Detect</button>
        <button class="btn btn-audio" id="audioBtn" onclick="playAudio()">🔊</button>
    </div>
 
    <div class="output-wrap" id="outputWrap">
        <div class="output-inner">
            <p class="output-label">Detected gesture</p>
            <p id="output" class="none-state">None yet</p>
            <p id="output-en"></p>
        </div>
    </div>
 
</div>
 

<div class="toast" id="toast"></div>
 
<script>
// ── Elements ───────────────────────────────────────────────
const video      = document.getElementById("video");
const card       = document.getElementById("card");
const outputEl   = document.getElementById("output");
const outputEnEl = document.getElementById("output-en");
const outputWrap = document.getElementById("outputWrap");
const audioBtn   = document.getElementById("audioBtn");
 
let lastGesture   = "";   // translated text
let lastGestureEn = "";   // original English from model
let lastLang      = "en";
 
// ── Camera ─────────────────────────────────────────────────
navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => {
    video.srcObject = stream;
    video.addEventListener('loadeddata', () => {
      document.getElementById('camPlaceholder').style.display = 'none';
    });
  })
  .catch(() => {
    document.getElementById('camPlaceholder').innerHTML =
      '<span class="cam-icon">🚫</span><span>Camera access denied</span>';
  });
 
// ── Translation dictionary ─────────────────────────────────
// Keys: lowercase English word/phrase
const dict = {
  "hello":       { hi:"नमस्ते",       es:"hola",           fr:"bonjour",         de:"hallo"           },
  "yes":         { hi:"हाँ",           es:"sí",             fr:"oui",             de:"ja"              },

  "thankyou":    { hi:"धन्यवाद",       es:"gracias",        fr:"merci",           de:"danke"           },
  "please":      { hi:"कृपया",         es:"por favor",      fr:"s'il vous plaît", de:"bitte"           },
  "welcome":     { hi:"स्वागत है",     es:"bienvenido",     fr:"bienvenue",       de:"willkommen"      },
  "sorry":       { hi:"माफ़ कीजिए",    es:"lo siento",      fr:"désolé",          de:"entschuldigung"  },
  "india":       { hi:"भारत",          es:"india",          fr:"inde",            de:"indien"          },
  "man":         { hi:"आदमी",          es:"hombre",         fr:"homme",           de:"mann"            },
  "woman":       { hi:"महिला",         es:"mujer",          fr:"femme",           de:"frau"            },
  "like":        { hi:"पसंद",          es:"me gusta",       fr:"aimer",           de:"mögen"           },
  "angry":       { hi:"गुस्सा",        es:"enojado",        fr:"en colère",       de:"wütend"          },
  "jealous":     { hi:"ईर्ष्या",       es:"celoso",         fr:"jaloux",          de:"eifersüchtig"    },
  "sad":         { hi:"उदास",          es:"triste",         fr:"triste",          de:"traurig"         },
  "happy":       { hi:"खुश",           es:"feliz",          fr:"heureux",         de:"glücklich"       },
  "yellow":      { hi:"पीला",          es:"amarillo",       fr:"jaune",           de:"gelb"            },
  "flower":      { hi:"फूल",           es:"flor",           fr:"fleur",           de:"blume"           },
  "again":       { hi:"फिर से",        es:"de nuevo",       fr:"encore",          de:"wieder"          },
  "teacher":     { hi:"शिक्षक",        es:"maestro",        fr:"professeur",      de:"lehrer"          },
  "camera":      { hi:"कैमरा",         es:"cámara",         fr:"caméra",          de:"kamera"          },
  "language":    { hi:"भाषा",          es:"idioma",         fr:"langue",          de:"sprache"         },
  "water":       { hi:"पानी",          es:"agua",           fr:"eau",             de:"wasser"          },
  "food":        { hi:"खाना",          es:"comida",         fr:"nourriture",      de:"essen"           },
  "help":        { hi:"मदद",           es:"ayuda",          fr:"aide",            de:"hilfe"           },
  "good":        { hi:"अच्छा",         es:"bueno",          fr:"bon",             de:"gut"             },
  "bad":         { hi:"बुरा",          es:"malo",           fr:"mauvais",         de:"schlecht"        },
  "monday":      { hi:"सोमवार",        es:"lunes",          fr:"lundi",           de:"montag"          },
  "tuesday":     { hi:"मंगलवार",       es:"martes",         fr:"mardi",           de:"dienstag"        },
  "wednesday":   { hi:"बुधवार",        es:"miércoles",      fr:"mercredi",        de:"mittwoch"        },
  "thursday":    { hi:"गुरुवार",       es:"jueves",         fr:"jeudi",           de:"donnerstag"      },
  "friday":      { hi:"शुक्रवार",      es:"viernes",        fr:"vendredi",        de:"vendredi"        },
  "saturday":    { hi:"शनिवार",        es:"sábado",         fr:"samedi",          de:"samstag"         },
  "sunday":      { hi:"रविवार",        es:"domingo",        fr:"dimanche",        de:"sonntag"         }
};
 
// BCP-47 tags for SpeechSynthesis
const langTags = { en:"en-US", hi:"hi-IN", es:"es-ES", fr:"fr-FR", de:"de-DE" };
 
// ── Translate ──────────────────────────────────────────────
function translateText(text, lang) {
  if (lang === "en") return text;
  const key = text.trim().toLowerCase();
  return dict[key]?.[lang] || text;   // fallback: show original
}
 
// ── Speak ──────────────────────────────────────────────────
function speak(text, lang) {
  if (!text) return;
  speechSynthesis.cancel();
  const utter  = new SpeechSynthesisUtterance(text);
  utter.lang   = langTags[lang] || "en-US";
  utter.rate   = 0.95;
  utter.pitch  = 1;
 
  audioBtn.classList.add("speaking");
  utter.onend  = () => audioBtn.classList.remove("speaking");
  utter.onerror= () => audioBtn.classList.remove("speaking");
 
  speechSynthesis.speak(utter);
}
 
// ── Toast ──────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2400);
}
 
// ── Update output UI ───────────────────────────────────────
function updateOutput(gestureEn, lang) {
  const translated = translateText(gestureEn, lang);
 
  lastGesture   = translated;
  lastGestureEn = gestureEn;
  lastLang      = lang;
 
  outputEl.textContent = translated;
  outputEl.classList.remove("none-state");
  outputEl.classList.add("result-pop");
  setTimeout(() => outputEl.classList.remove("result-pop"), 500);
 
  // Show English label when another language is active
  if (lang !== "en" && translated.toLowerCase() !== gestureEn.toLowerCase()) {
    outputEnEl.textContent = gestureEn + " (en)";
  } else {
    outputEnEl.textContent = "";
  }
 
  outputWrap.classList.add("has-result");
}
 
// ── Detect ─────────────────────────────────────────────────

  } catch (err) {

async function getGesture() {
  card.classList.add("detecting");
  outputEl.textContent = "Detecting…";
  outputEl.classList.add("none-state");
  outputEnEl.textContent = "";
  outputWrap.classList.remove("has-result");

  try {
    const canvas = document.getElementById("canvas");
    const ctx    = canvas.getContext("2d");
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;

    // ✅ Mirror the canvas to match collect_data.py (which flips the frame)
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0);
    ctx.setTransform(1, 0, 0, 1, 0, 0); // reset transform after draw

    const res = await fetch('/predict', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: canvas.toDataURL("image/jpeg", 0.9) }) // ✅ 0.9 quality
    });

    const data = await res.json();
    const lang = document.getElementById("language").value;
    updateOutput(data.gesture, lang);

  } catch (err) {
    outputEl.textContent = "Detection failed";
    outputEl.classList.add("none-state");
    showToast("⚠️ Could not reach /predict");
    console.error(err);
  } finally {
    card.classList.remove("detecting");
  }
}
 
// ── Audio button ───────────────────────────────────────────
function playAudio() {
  if (!lastGesture) {
    showToast("Detect a gesture first!");
    return;
  }
  speak(lastGesture, lastLang);
}
 
// ── Re-translate when language changes ─────────────────────
document.getElementById("language").addEventListener("change", function () {
  if (!lastGestureEn) return;
  updateOutput(lastGestureEn, this.value);
});
</script>
 
</body>
</html>
